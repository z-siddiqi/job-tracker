{% load static %}

<div class="side-bar" id="sideBar">
    <nav class="side-nav">
        <div>
            <div class="side-nav-logo">
                <img src="{% static 'img/logo-alt.png' %}" height="20px">
                <span class="side-nav-logo-name">
                    Job <span>Tracker</span>
                </span>
            </div>
            <div>
                <a href="{% url 'board_list' %}" class="side-nav-link" id="boards">
                    <i class="bx bx-grid-alt side-nav-icon"></i>
                    <span>Boards</span>
                </a>
                <a href="{% url 'metrics' %}" class="side-nav-link" id="metrics">
                    <i class="bx bx-bar-chart-alt-2 side-nav-icon"></i>
                    <span>Metrics</span>
                </a>
                <a href="{% url 'account_detail' %}" class="side-nav-link" id="accounts">
                    <i class="bx bx-user-circle side-nav-icon"></i>
                    <span>Account</span>
                </a>
            </div>
        </div>
    </nav>
</div>

<script>
    document.addEventListener("DOMContentLoaded", (e) => {
      const windowPath = window.location.pathname.split("/")[1];
      document.querySelector("#" + windowPath).classList.add("active-link");
    
      document
        .querySelector("#appHeaderToggle")
        .addEventListener("click", (e) => {
          document.querySelector("#appHeaderToggle").classList.toggle("bx-x"); // change icon
          document.querySelector("#sideBar").classList.toggle("show-nav"); // show navbar
          document.querySelector("body").classList.toggle("body-pd"); // add padding to body
          document.querySelector("#appHeader").classList.toggle("body-pd"); // add padding to header
        });
    });
</script>
